<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Ridge Solutions — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2c5b;
    --navy-dark: #0f1c3d;
    --navy-mid: #2a3f7a;
    --blue-accent: #3a6fd8;
    --light: #f4f6fb;
    --white: #ffffff;
    --gray: #8899bb;
    --border: rgba(26,44,91,0.12);
  }

  html, body {
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
    background: var(--light);
    color: var(--navy);
    overflow-x: hidden;
  }

  /* ─── MARQUEE ─── */
  .logo-marquee {
    overflow: hidden;
    padding: 20px 0;
    background: transparent;
    white-space: nowrap;
    position: relative;
    width: 100%;
    max-width: 800px;
    margin: 0 auto 3.5rem;
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .logo-marquee::before,
  .logo-marquee::after {
    position: absolute; top: 0;
    width: 100px; height: 100%;
    content: ""; z-index: 2;
  }
  .logo-marquee::before {
    left: 0;
    background: linear-gradient(to right, var(--light), rgba(244,246,251,0));
  }
  .logo-marquee::after {
    right: 0;
    background: linear-gradient(to left, var(--light), rgba(244,246,251,0));
  }
  .logo-track {
    display: inline-flex;
    align-items: center;
    animation: scrollMarquee 35s linear infinite;
  }
  .logo-marquee:hover .logo-track { animation-play-state: paused; }
  .logo-item {
    padding: 0 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--navy-mid);
    opacity: 0.65;
    white-space: nowrap;
    transition: opacity 0.3s, color 0.3s;
    cursor: default;
  }
  .logo-badge:hover {
    opacity: 1;
    color: var(--blue-accent);
  }
  .logo-badge svg { width: 18px; height: 18px; flex-shrink: 0; }
  
  @keyframes scrollMarquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 72px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .nav-left { display: flex; align-items: center; gap: 1rem; }
  .hamburger {
    cursor: pointer;
    display: flex; flex-direction: column; gap: 5px;
    padding: 8px; border-radius: 6px;
    transition: background 0.2s;
  }
  .hamburger:hover { background: var(--light); }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: var(--navy); border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-weight: 700; color: var(--navy); }
  .nav-right { display: flex; align-items: center; gap: 0.5rem; }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 18px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer; border: none; border-radius: 4px;
    background: transparent; color: var(--navy);
    transition: background 0.2s, color 0.2s;
  }
  .nav-btn:hover { background: var(--light); color: var(--blue-accent); }
  .nav-btn.primary { background: var(--navy); color: white; }
  .nav-btn.primary:hover { background: var(--navy-mid); color: white; }
  .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ─── SIDE MENU ─── */
  .side-menu {
    position: fixed; top: 72px; left: 0;
    width: 280px; height: calc(100vh - 72px);
    background: var(--white); border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 99; padding: 2rem 0;
    box-shadow: 4px 0 20px rgba(26,44,91,0.08);
  }
  .side-menu.open { transform: translateX(0); }
  .side-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 2rem;
    font-weight: 500; color: var(--navy); cursor: pointer;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.02em; text-transform: uppercase;
    font-size: 12px; border-left: 3px solid transparent;
  }
  .side-menu-item:hover { background: var(--light); border-left-color: var(--blue-accent); color: var(--blue-accent); }
  .side-menu-item svg { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .side-menu-divider { height: 1px; background: var(--border); margin: 1rem 2rem; }
  .side-menu-label {
    padding: 0.75rem 2rem 0.25rem;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray);
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,28,61,0.25);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s; z-index: 98;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
    padding: 8rem 2rem 4rem;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(58,111,216,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(26,44,91,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .grid-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(26,44,91,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,44,91,0.04) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
  .coming-soon-word {
    position: relative; z-index: 2;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .coming-soon-word h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(5rem, 15vw, 11rem);
    font-weight: 700; letter-spacing: -0.02em; line-height: 0.9;
    background: linear-gradient(160deg, rgba(26,44,91,0.12) 0%, rgba(58,111,216,0.08) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; user-select: none;
  }
  .hero-tagline {
    position: relative; z-index: 2;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.6rem);
    font-weight: 300; color: var(--navy-mid);
    letter-spacing: 0.08em; margin-bottom: 0.75rem;
    animation: fadeUp 0.8s 0.25s ease both;
  }
  .hero-sub {
    position: relative; z-index: 2;
    font-size: 14px; color: var(--gray);
    letter-spacing: 0.05em; margin-bottom: 3.5rem;
    animation: fadeUp 0.8s 0.35s ease both;
  }
  .hero-services {
    position: relative; z-index: 2;
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 2rem;
    animation: fadeUp 0.8s 0.45s ease both;
  }
  .service-pill {
    padding: 7px 16px; border: 1px solid var(--border);
    border-radius: 100px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.05em; color: var(--navy-mid);
    background: white; text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, background 0.2s; cursor: default;
  }
  .service-pill:hover { border-color: var(--blue-accent); color: var(--blue-accent); background: rgba(58,111,216,0.04); }
  
  .notify-bar {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border); border-radius: 6px;
    background: white; overflow: hidden;
    box-shadow: 0 2px 16px rgba(26,44,91,0.07);
    animation: fadeUp 0.8s 0.65s ease both;
  }
  .notify-bar input {
    border: none; outline: none;
    padding: 14px 20px;
    font-family: 'Barlow', sans-serif; font-size: 14px;
    color: var(--navy); width: 260px; background: transparent;
  }
  .notify-bar input::placeholder { color: var(--gray); }
  .notify-bar button {
    padding: 14px 24px; background: var(--navy); color: white;
    border: none; font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  .notify-bar button:hover { background: var(--navy-mid); }
  .notify-note {
    position: relative; z-index: 2;
    margin-top: 14px; font-size: 11px; color: var(--gray);
    letter-spacing: 0.04em; animation: fadeUp 0.8s 0.7s ease both;
  }

  /* ─── COUNTDOWN ─── */
  .countdown {
    position: relative; z-index: 2;
    display: flex; gap: 2rem; margin-bottom: 3rem;
    animation: fadeUp 0.8s 0.55s ease both;
  }
  .count-block { text-align: center; }
  .count-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.5rem; font-weight: 700;
    color: var(--navy); line-height: 1; min-width: 60px;
  }
  .count-label {
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gray); margin-top: 4px;
  }
  .count-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 300;
    color: var(--border); align-self: center; margin-top: -8px;
  }

  /* ─── PANELS ─── */
  .panel-overlay {
    position: fixed; inset: 0;
    background: rgba(15,28,61,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 2rem;
  }
  .panel-overlay.show { display: flex; }
  .panel-card {
    background: white; border-radius: 12px; padding: 2.5rem;
    max-width: 520px; width: 100%; position: relative;
    box-shadow: 0 20px 60px rgba(15,28,61,0.2);
    animation: popIn 0.3s ease;
  }
  .panel-close {
    position: absolute; top: 1.25rem; right: 1.25rem;
    width: 32px; height: 32px; border: 1px solid var(--border);
    border-radius: 50%; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--navy); font-size: 18px; line-height: 1; transition: background 0.2s;
  }
  .panel-close:hover { background: var(--light); }
  .panel-tag {
    display: inline-block; padding: 4px 12px;
    background: rgba(58,111,216,0.1); color: var(--blue-accent);
    border-radius: 100px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem;
  }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 700; color: var(--navy-dark);
    letter-spacing: -0.01em; margin-bottom: 1rem;
  }
  .panel-body { font-size: 14px; line-height: 1.75; color: #4a5a7a; margin-bottom: 1.5rem; }
  .panel-field { margin-bottom: 1rem; }
  .panel-field label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gray); margin-bottom: 6px;
  }
  .panel-field input, .panel-field textarea {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border);
    border-radius: 6px; font-family: 'Barlow', sans-serif;
    font-size: 14px; color: var(--navy); background: white;
    outline: none; transition: border-color 0.2s; resize: none;
  }
  .panel-field input:focus, .panel-field textarea:focus { border-color: var(--blue-accent); }
  .panel-field textarea { min-height: 100px; }
  .panel-submit {
    width: 100%; padding: 13px; background: var(--navy); color: white;
    border: none; border-radius: 6px; font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  .panel-submit:hover { background: var(--navy-mid); }
  
  .blog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .blog-card-item {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .blog-card-item:hover { border-color: var(--blue-accent); background: var(--light); }
  .blog-card-item .bc-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue-accent); margin-bottom: 6px; }
  .blog-card-item .bc-title { font-size: 13px; font-weight: 600; color: var(--navy-dark); line-height: 1.4; margin-bottom: 4px; }
  .blog-card-item .bc-date { font-size: 11px; color: var(--gray); }

  /* ─── FOOTER ─── */
  footer { background: var(--navy-dark); color: white; padding: 4rem 0 0; }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem; }
  .footer-top {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 3rem;
    padding-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .footer-brand h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; color: white; margin-bottom: 1rem; }
  .footer-brand p { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.55); max-width: 280px; }
  .footer-col h4 {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 1.25rem;
  }
  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 10px; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; transition: color 0.2s; }
  .footer-col ul li:hover { color: white; }
  .footer-contact-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
  .footer-contact-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.5; }
  .footer-middle {
    padding: 2.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
  }
  .footer-social-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
  .social-links { display: flex; align-items: center; gap: 16px; }
  .social-btn {
    width: 44px; height: 44px; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s; color: rgba(255,255,255,0.6);
  }
  .social-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: white; }
  .social-btn svg { width: 18px; height: 18px; }
  .footer-bottom {
    padding: 1.5rem 0; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .footer-bottom p { font-size: 12px; color: rgba(255,255,255,0.3); }
  .footer-bottom-links { display: flex; gap: 1.5rem; }
  .footer-bottom-links span { font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer; transition: color 0.2s; }
  .footer-bottom-links span:hover { color: rgba(255,255,255,0.6); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ─── TABLET / MOBILE ─── */
  @media (max-width: 768px) {
    nav { padding: 0
